<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校招HR评分测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-8">
    <div class="max-w-2xl mx-auto px-4">
        <h1 class="text-2xl font-bold text-center mb-6">🎓 校招HR评分测试</h1>

        <!-- 测试按钮 -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4">测试案例</h2>
            <div class="space-y-3">
                <button onclick="testTopCandidate()" class="w-full py-2 px-4 bg-green-500 text-white rounded-lg hover:bg-green-600">
                    测试：清北硕士 + 字节实习 (A档)
                </button>
                <button onclick="testMidCandidate()" class="w-full py-2 px-4 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                    测试：211本科 + 小厂实习 (B档)
                </button>
                <button onclick="testNormalCandidate()" class="w-full py-2 px-4 bg-gray-500 text-white rounded-lg hover:bg-gray-600">
                    测试：普本 + 无实习 (C档)
                </button>
            </div>
        </div>

        <!-- 结果展示 -->
        <div id="result" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-lg font-semibold mb-4">评分结果</h2>
            <div id="score-details"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8888';

        async function testTopCandidate() {
            const resumeData = {
                basic_info: {
                    name: "张三",
                    university: "清华大学",
                    major: "计算机科学与技术",
                    degree: "硕士",
                    graduation_year: "2026"
                },
                experience: [
                    { company: "字节跳动", position: "算法实习生" },
                    { company: "腾讯", position: "后端开发实习生" }
                ],
                projects: [
                    {
                        name: "大模型推理优化",
                        tech_stack: ["Python", "C++", "CUDA"],
                        description: "优化Transformer推理速度，提升吞吐量3倍"
                    }
                ],
                skills: ["Python", "C++", "Java", "机器学习", "数据结构", "算法", "MySQL", "Redis", "HTTP"]
            };
            await fetchScore(resumeData);
        }

        async function testMidCandidate() {
            const resumeData = {
                basic_info: {
                    name: "李四",
                    university: "北京交通大学",
                    major: "软件工程",
                    degree: "本科",
                    graduation_year: "2026"
                },
                experience: [
                    { company: "某创业公司", position: "前端开发实习生" }
                ],
                projects: [
                    {
                        name: "个人博客系统",
                        tech_stack: ["Vue", "Node.js"],
                        description: "使用Vue3和Express开发个人博客"
                    }
                ],
                skills: ["JavaScript", "Vue", "HTML", "CSS", "Node.js"]
            };
            await fetchScore(resumeData);
        }

        async function testNormalCandidate() {
            const resumeData = {
                basic_info: {
                    name: "王五",
                    university: "某某普通本科",
                    major: "工商管理",
                    degree: "本科",
                    graduation_year: "2026"
                },
                experience: [],
                projects: [
                    {
                        name: "课程作业",
                        tech_stack: ["Python"],
                        description: "数据分析课程作业"
                    }
                ],
                skills: ["Python", "Excel"]
            };
            await fetchScore(resumeData);
        }

        async function fetchScore(resumeData) {
            const resultDiv = document.getElementById('result');
            const detailsDiv = document.getElementById('score-details');

            resultDiv.classList.remove('hidden');
            detailsDiv.innerHTML = '<p class="text-gray-500">评分中...</p>';

            try {
                const response = await fetch(`${API_URL}/api/v1/campus-score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resume_data: resumeData })
                });

                const result = await response.json();

                if (result.success) {
                    const data = result.data;
                    const gradeColors = { 'S': 'text-yellow-500', 'A': 'text-green-500', 'B': 'text-blue-500', 'C': 'text-orange-500', 'D': 'text-red-500' };

                    detailsDiv.innerHTML = `
                        <div class="text-center mb-6">
                            <div class="text-6xl font-bold ${gradeColors[data.grade] || 'text-gray-500'}">${data.total_score}</div>
                            <div class="text-xl text-gray-600">${data.grade}级</div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="text-center p-3 bg-blue-50 rounded-lg">
                                <div class="text-2xl font-bold text-blue-600">${data.scores.university}</div>
                                <div class="text-sm text-gray-500">学校层级</div>
                            </div>
                            <div class="text-center p-3 bg-purple-50 rounded-lg">
                                <div class="text-2xl font-bold text-purple-600">${data.scores.degree}</div>
                                <div class="text-sm text-gray-500">学历</div>
                            </div>
                            <div class="text-center p-3 bg-green-50 rounded-lg">
                                <div class="text-2xl font-bold text-green-600">${data.scores.major}</div>
                                <div class="text-sm text-gray-500">专业匹配</div>
                            </div>
                            <div class="text-center p-3 bg-orange-50 rounded-lg">
                                <div class="text-2xl font-bold text-orange-600">${data.scores.internship}</div>
                                <div class="text-sm text-gray-500">实习经历</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <h3 class="font-semibold mb-2">详情</h3>
                            <p class="text-sm text-gray-600">学校：${data.details.university_tier}</p>
                            <p class="text-sm text-gray-600">学历：${data.details.degree_level}</p>
                            <p class="text-sm text-gray-600">实习：${data.details.internship_companies.length > 0 ? data.details.internship_companies.join(', ') : '无'}</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-3 bg-green-50 rounded-lg">
                                <h3 class="font-semibold text-green-700 mb-2">✓ 优势</h3>
                                <ul class="text-sm text-green-600">
                                    ${data.analysis.strengths.map(s => `<li>• ${s}</li>`).join('') || '<li>无明显优势</li>'}
                                </ul>
                            </div>
                            <div class="p-3 bg-orange-50 rounded-lg">
                                <h3 class="font-semibold text-orange-700 mb-2">▲ 待提升</h3>
                                <ul class="text-sm text-orange-600">
                                    ${data.analysis.weaknesses.map(w => `<li>• ${w}</li>`).join('') || '<li>无明显劣势</li>'}
                                </ul>
                            </div>
                        </div>

                        <div class="mt-4 p-3 bg-blue-50 rounded-lg">
                            <h3 class="font-semibold mb-1">💡 HR建议</h3>
                            <p class="text-sm text-gray-600">${data.analysis.recommendation}</p>
                        </div>
                    `;
                } else {
                    detailsDiv.innerHTML = `<p class="text-red-500">评分失败: ${result.message}</p>`;
                }
            } catch (error) {
                detailsDiv.innerHTML = `<p class="text-red-500">请求失败: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
