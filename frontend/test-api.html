<!DOCTYPE html>
<html>
<head>
    <title>API 测试</title>
</head>
<body>
    <h1>Offer 捕手 - API 测试</h1>

    <h2>1. 简历解析测试</h2>
    <textarea id="resume-text" rows="10" cols="60">姓名：徐琳迪
学校：华东师范大学
专业：国际中文教育
学历：硕士在读
技能：Python, Claude API, Prompt Engineering, 数据分析, 产品分析

工作经历：
公司：教育科技公司
职位：产品运营实习生
时间：2024.06-2024.09
描述：协助产品团队进行用户研究和竞品分析

项目经历：
项目：AI学习助手
时间：2024.09-2024.12
技术栈：Claude API, Python
描述：基于Claude API开发个性化学习推荐系统</textarea>
    <br><br>
    <button onclick="testResumeParse()">测试简历解析</button>
    <pre id="resume-result"></pre>

    <h2>2. JD 解析测试</h2>
    <textarea id="jd-text" rows="10" cols="60">职位要求：
1. 硕士及以上学历，计算机相关专业
2. 熟练使用Python、Claude API
3. 有AI产品分析经验
4. 良好的沟通能力和团队协作精神</textarea>
    <br><br>
    <button onclick="testJobParse()">测试JD解析</button>
    <pre id="job-result"></pre>

    <script>
        const API_URL = 'http://localhost:8000';

        async function testResumeParse() {
            const text = document.getElementById('resume-text').value;
            const formData = new FormData();
            formData.append('text', text);

            try {
                const res = await fetch(`${API_URL}/api/v1/resume/parse-text`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                document.getElementById('resume-result').textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('resume-result').textContent = 'Error: ' + err.message;
            }
        }

        async function testJobParse() {
            const text = document.getElementById('jd-text').value;
            const formData = new FormData();
            formData.append('jd_text', text);

            try {
                const res = await fetch(`${API_URL}/api/v1/job/parse`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                document.getElementById('job-result').textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('job-result').textContent = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
