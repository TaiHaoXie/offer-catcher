services:
  - type: web
    name: offer-catcher
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KIMI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
